<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CV Analyzer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <div class="header-badge">✨ مدعوم بالذكاء الاصطناعي</div>
    <h1>محلل السيرة الذاتية</h1>
    <p>ارفع الـ CV بتاعك وهنحلله في ثواني ونديك تقرير احترافي كامل</p>
  </header>

  <main>

    <div class="upload-box" id="uploadBox">
      <div class="upload-icon">📄</div>
      <h2>ارفع الـ CV بتاعك</h2>
      <p>PDF أو صورة — الحجم الأقصى 10MB</p>
      <input type="file" id="cvFile" accept=".pdf,.jpg,.jpeg,.png,.webp" hidden>
      <button class="btn-upload" onclick="document.getElementById('cvFile').click()">
        اختار ملف
      </button>
      <p class="file-name" id="fileName">لم يتم اختيار ملف</p>
    </div>

    <button class="btn-analyze" id="analyzeBtn" onclick="analyzeCV()" disabled>
      🔍 حلل الـ CV دلوقتي
    </button>

    <div class="loading" id="loading" hidden>
      <div class="spinner"></div>
      <p>جاري تحليل الـ CV بالذكاء الاصطناعي...</p>
    </div>

    <div class="result-box" id="resultBox" hidden>
      <h2>📊 نتيجة التحليل</h2>
      <div class="result-content" id="resultContent"></div>
      <button class="btn-upload" style="margin-top:20px" onclick="resetForm()">
        🔄 حلل CV تاني
      </button>
    </div>

  </main>

  <footer>
    <p>🤖 محلل السيرة الذاتية — صُنع بـ ❤️</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
